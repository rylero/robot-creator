name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binaries
        run: |
          VERSION=${GITHUB_REF_NAME}
          LDFLAGS="-s -w -X github.com/rylero/robot-creator/cmd.Version=${VERSION}"

          GOOS=windows GOARCH=amd64 go build -ldflags="${LDFLAGS}" -o dist/robot-creator-windows-amd64.exe .
          GOOS=linux   GOARCH=amd64 go build -ldflags="${LDFLAGS}" -o dist/robot-creator-linux-amd64 .
          GOOS=darwin  GOARCH=amd64 go build -ldflags="${LDFLAGS}" -o dist/robot-creator-macos-amd64 .
          GOOS=darwin  GOARCH=arm64 go build -ldflags="${LDFLAGS}" -o dist/robot-creator-macos-arm64 .

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
